<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prescription Data Flow Validation</title>
    <style>
        :root {
            --bg: #f3f0e8;
            --panel: rgba(255, 252, 246, 0.92);
            --ink: #1f2430;
            --muted: #667085;
            --line: rgba(31, 36, 48, 0.12);
            --accent: #0d6f5b;
            --accent-soft: rgba(13, 111, 91, 0.1);
            --warn: #c67c12;
            --warn-soft: rgba(198, 124, 18, 0.12);
            --danger: #b42318;
            --danger-soft: rgba(180, 35, 24, 0.12);
            --pass: #0d6f5b;
            --review: #9a6700;
            --suspect: #b42318;
            --shadow: 0 20px 50px rgba(32, 44, 64, 0.08);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Pretendard", "Noto Sans KR", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(13, 111, 91, 0.08), transparent 35%),
                linear-gradient(180deg, #f8f4ea 0%, #f0ebe1 100%);
        }

        .page {
            max-width: 1440px;
            margin: 0 auto;
            padding: 28px 20px 40px;
        }

        .hero {
            display: grid;
            gap: 18px;
            background: linear-gradient(135deg, rgba(13, 111, 91, 0.96), rgba(22, 56, 46, 0.96));
            color: #f8fbf9;
            padding: 28px;
            border-radius: 28px;
            box-shadow: var(--shadow);
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(28px, 4vw, 44px);
            line-height: 1.1;
        }

        .hero p {
            margin: 0;
            color: rgba(248, 251, 249, 0.84);
            font-size: 15px;
        }

        .summary-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .summary-pill {
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            font-size: 13px;
        }

        .section {
            margin-top: 20px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 22px;
            box-shadow: var(--shadow);
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .section-head h2 {
            margin: 0;
            font-size: 22px;
        }

        .section-head span {
            color: var(--muted);
            font-size: 13px;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
        }

        .kpi-card {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 18px;
        }

        .kpi-card .label {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 8px;
        }

        .kpi-card .value {
            font-size: 28px;
            font-weight: 700;
        }

        .verdict-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            margin-top: 16px;
        }

        .verdict-card {
            border-radius: 18px;
            padding: 18px;
            border: 1px solid transparent;
        }

        .verdict-card.pass { background: var(--accent-soft); color: var(--pass); }
        .verdict-card.review { background: var(--warn-soft); color: var(--review); }
        .verdict-card.suspect { background: var(--danger-soft); color: var(--suspect); }

        .verdict-card .value {
            font-size: 30px;
            font-weight: 700;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
        }

        .filters select {
            min-width: 180px;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: #fff;
            color: var(--ink);
        }

        .table-wrap {
            overflow: auto;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 980px;
        }

        th, td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid var(--line);
            font-size: 13px;
            vertical-align: top;
        }

        th {
            position: sticky;
            top: 0;
            background: #f8f5ef;
            z-index: 1;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge.pass { background: var(--accent-soft); color: var(--pass); }
        .badge.review { background: var(--warn-soft); color: var(--review); }
        .badge.suspect { background: var(--danger-soft); color: var(--suspect); }

        .sub-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 16px;
        }

        .empty {
            padding: 24px;
            color: var(--muted);
            text-align: center;
        }

        @media (max-width: 960px) {
            .sub-grid {
                grid-template-columns: 1fr;
            }
            .section {
                padding: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <section class="hero">
            <div>
                <h1>Prescription Data Flow Validation</h1>
                <p>처방 흐름 추적과 주장 금액 검증을 한 화면에서 확인합니다.</p>
            </div>
            <div class="summary-list" id="summaryList"></div>
        </section>

        <section class="section">
            <div class="section-head">
                <h2>핵심 현황</h2>
                <span id="qualityStatus"></span>
            </div>
            <div class="kpi-grid" id="overviewCards"></div>
            <div class="verdict-grid" id="verdictCards"></div>
        </section>

        <section class="section">
            <div class="section-head">
                <h2>주장 금액 비교표</h2>
                <span>PASS, REVIEW, SUSPECT를 필터로 바로 볼 수 있습니다.</span>
            </div>
            <div class="filters">
                <select id="quarterFilter"></select>
                <select id="repFilter"></select>
                <select id="verdictFilter"></select>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>분기</th>
                            <th>담당자</th>
                            <th>병원</th>
                            <th>품목</th>
                            <th>주장금액</th>
                            <th>추적금액</th>
                            <th>차이금액</th>
                            <th>차이율</th>
                            <th>판정</th>
                            <th>메모</th>
                        </tr>
                    </thead>
                    <tbody id="claimTableBody"></tbody>
                </table>
            </div>
        </section>

        <section class="section">
            <div class="section-head">
                <h2>추적 보조표</h2>
                <span>병원 추적 상위와 미연결 약국을 함께 봅니다.</span>
            </div>
            <div class="sub-grid">
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>분기</th>
                                <th>담당자</th>
                                <th>병원</th>
                                <th>품목</th>
                                <th>추적금액</th>
                                <th>약국수</th>
                                <th>도매수</th>
                            </tr>
                        </thead>
                        <tbody id="traceTableBody"></tbody>
                    </table>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>분기</th>
                                <th>약국</th>
                                <th>품목</th>
                                <th>사유</th>
                            </tr>
                        </thead>
                        <tbody id="gapTableBody"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <script>
        window.__PRESCRIPTION_DATA__ = {};

        const data = window.__PRESCRIPTION_DATA__ || {};
        const claims = data.claims || [];
        const gaps = data.gaps || [];
        const traces = data.hospital_traces || [];
        const overview = data.overview || {};

        const fmtCurrency = (value) => {
            const amount = Number(value || 0);
            return `${Math.round(amount).toLocaleString("ko-KR")}원`;
        };

        const fmtPercent = (value) => `${(Number(value || 0) * 100).toFixed(1)}%`;

        const summaryList = document.getElementById("summaryList");
        const overviewCards = document.getElementById("overviewCards");
        const verdictCards = document.getElementById("verdictCards");
        const qualityStatus = document.getElementById("qualityStatus");
        const quarterFilter = document.getElementById("quarterFilter");
        const repFilter = document.getElementById("repFilter");
        const verdictFilter = document.getElementById("verdictFilter");
        const claimTableBody = document.getElementById("claimTableBody");
        const traceTableBody = document.getElementById("traceTableBody");
        const gapTableBody = document.getElementById("gapTableBody");

        function makeOptions(select, values, defaultLabel) {
            select.innerHTML = "";
            const allOption = document.createElement("option");
            allOption.value = "";
            allOption.textContent = defaultLabel;
            select.appendChild(allOption);
            values.forEach((value) => {
                const option = document.createElement("option");
                option.value = value;
                option.textContent = value;
                select.appendChild(option);
            });
        }

        function renderSummary() {
            const claimSummary = overview.claim_validation_summary || {};
            const summaryItems = [
                `${data.company || "회사 미지정"} 검증`,
                `흐름 ${Number(overview.flow_record_count || 0).toLocaleString("ko-KR")}건`,
                `연결 병원 ${Number(overview.connected_hospital_count || 0).toLocaleString("ko-KR")}개`,
                `미연결 ${Number(overview.gap_record_count || 0).toLocaleString("ko-KR")}건`
            ];
            summaryList.innerHTML = summaryItems.map((item) => `<div class="summary-pill">${item}</div>`).join("");

            const cards = [
                ["표준 레코드", Number(overview.standard_record_count || 0).toLocaleString("ko-KR")],
                ["흐름 레코드", Number(overview.flow_record_count || 0).toLocaleString("ko-KR")],
                ["연결 병원", Number(overview.connected_hospital_count || 0).toLocaleString("ko-KR")],
                ["품질 점수", `${Number(overview.quality_score || 0).toFixed(1)}점`]
            ];
            overviewCards.innerHTML = cards.map(([label, value]) => `
                <div class="kpi-card">
                    <div class="label">${label}</div>
                    <div class="value">${value}</div>
                </div>
            `).join("");

            qualityStatus.textContent = `품질 상태: ${overview.quality_status || "unknown"}`;

            const verdictItems = [
                ["pass", "PASS", claimSummary.pass_count || 0],
                ["review", "REVIEW", claimSummary.review_count || 0],
                ["suspect", "SUSPECT", claimSummary.suspect_count || 0]
            ];
            verdictCards.innerHTML = verdictItems.map(([cls, label, value]) => `
                <div class="verdict-card ${cls}">
                    <div>${label}</div>
                    <div class="value">${Number(value).toLocaleString("ko-KR")}</div>
                </div>
            `).join("");
        }

        function renderClaimTable() {
            const quarter = quarterFilter.value;
            const rep = repFilter.value;
            const verdict = verdictFilter.value;
            const filtered = claims.filter((row) => {
                if (quarter && row.year_quarter !== quarter) return false;
                if (rep && row.rep_name !== rep) return false;
                if (verdict && row.verdict !== verdict) return false;
                return true;
            });

            if (!filtered.length) {
                claimTableBody.innerHTML = `<tr><td colspan="10" class="empty">조건에 맞는 비교표가 없습니다.</td></tr>`;
                return;
            }

            claimTableBody.innerHTML = filtered.map((row) => `
                <tr>
                    <td>${row.year_quarter}</td>
                    <td>${row.rep_name}<br><span style="color:#667085">${row.branch_name || ""}</span></td>
                    <td>${row.hospital_name}</td>
                    <td>${row.product_name}</td>
                    <td>${fmtCurrency(row.claimed_amount)}</td>
                    <td>${fmtCurrency(row.tracked_amount)}</td>
                    <td>${fmtCurrency(row.variance_amount)}</td>
                    <td>${fmtPercent(row.variance_rate)}</td>
                    <td><span class="badge ${String(row.verdict || "").toLowerCase()}">${row.verdict}</span></td>
                    <td>${row.review_note || ""}</td>
                </tr>
            `).join("");
        }

        function renderTraceTable() {
            traceTableBody.innerHTML = traces.slice(0, 20).map((row) => `
                <tr>
                    <td>${row.year_quarter}</td>
                    <td>${row.rep_name}</td>
                    <td>${row.hospital_name}</td>
                    <td>${row.product_name}</td>
                    <td>${fmtCurrency(row.total_amount)}</td>
                    <td>${Number(row.pharmacy_count || 0).toLocaleString("ko-KR")}</td>
                    <td>${Number(row.wholesaler_count || 0).toLocaleString("ko-KR")}</td>
                </tr>
            `).join("") || `<tr><td colspan="7" class="empty">추적 데이터가 없습니다.</td></tr>`;
        }

        function renderGapTable() {
            gapTableBody.innerHTML = gaps.slice(0, 20).map((row) => `
                <tr>
                    <td>${row.year_quarter}</td>
                    <td>${row.pharmacy_name}</td>
                    <td>${row.product_name || row.product_id}</td>
                    <td>${row.gap_reason}</td>
                </tr>
            `).join("") || `<tr><td colspan="4" class="empty">미연결 약국이 없습니다.</td></tr>`;
        }

        function initFilters() {
            const quarters = [...new Set(claims.map((row) => row.year_quarter).filter(Boolean))].sort();
            const reps = [...new Set(claims.map((row) => row.rep_name).filter(Boolean))].sort((a, b) => a.localeCompare(b, "ko"));
            const verdicts = [...new Set(claims.map((row) => row.verdict).filter(Boolean))];
            makeOptions(quarterFilter, quarters, "전체 분기");
            makeOptions(repFilter, reps, "전체 담당자");
            makeOptions(verdictFilter, verdicts, "전체 판정");
            [quarterFilter, repFilter, verdictFilter].forEach((select) => {
                select.addEventListener("change", renderClaimTable);
            });
        }

        renderSummary();
        initFilters();
        renderClaimTable();
        renderTraceTable();
        renderGapTable();
    </script>
</body>
</html>
