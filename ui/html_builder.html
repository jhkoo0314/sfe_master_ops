<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SFE OPS HTML Builder</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --surface2: #21262d;
        --border: #30363d;
        --text: #e6edf3;
        --muted: #8b949e;
        --primary: #58a6ff;
        --primary2: #1f6feb;
        --font: "Segoe UI", system-ui, sans-serif;
        --radius: 8px;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 12px 24px;
        display: flex;
        align-items: center;
        gap: 16px;
        flex-shrink: 0;
      }
      .logo {
        font-size: 16px;
        font-weight: 700;
        color: var(--primary);
        letter-spacing: -0.3px;
      }
      .logo span {
        color: var(--muted);
        font-weight: 400;
      }
      .layers {
        flex: 1;
        overflow: hidden;
        position: relative;
      }
      .layer {
        position: absolute;
        inset: 0;
        display: flex;
        overflow: hidden;
      }
      .ops-sidebar {
        width: 280px;
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .sidebar-header {
        padding: 16px;
        border-bottom: 1px solid var(--border);
      }
      .sidebar-header h3 {
        font-size: 13px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
      }
      .module-list {
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        overflow-y: auto;
        flex: 1;
      }
      .module-card {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 10px 12px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .module-card:hover {
        border-color: var(--primary);
      }
      .module-card.active {
        border-color: var(--primary);
        background: rgba(88, 166, 255, 0.08);
      }
      .module-card .mc-title {
        font-size: 13px;
        font-weight: 600;
      }
      .module-card .mc-desc {
        font-size: 11px;
        color: var(--muted);
        margin-top: 3px;
      }
      .upload-zone {
        margin: 12px;
        border: 2px dashed var(--border);
        border-radius: var(--radius);
        padding: 16px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
      }
      .upload-zone:hover {
        border-color: var(--primary);
      }
      .upload-zone p {
        font-size: 12px;
        color: var(--muted);
        margin-top: 6px;
      }
      .ops-main {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
      }
      .ops-placeholder {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        gap: 12px;
        color: var(--muted);
      }
      .ops-placeholder .icon {
        font-size: 48px;
        opacity: 0.4;
      }
      .ops-placeholder p {
        font-size: 14px;
      }
      .kpi-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-bottom: 20px;
      }
      .kpi-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px;
      }
      .kpi-card .kv {
        font-size: 22px;
        font-weight: 700;
        color: var(--primary);
      }
      .kpi-card .kl {
        font-size: 11px;
        color: var(--muted);
        margin-top: 4px;
      }
      .report-section {
        margin-bottom: 24px;
      }
      .report-section h3 {
        font-size: 13px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.4px;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
      }
      .data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      .data-table th {
        background: var(--surface2);
        color: var(--muted);
        font-weight: 500;
        padding: 8px 12px;
        text-align: left;
      }
      .data-table td {
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
      }
      .data-table tr:hover td {
        background: rgba(255, 255, 255, 0.03);
      }
      #ops-map {
        height: 420px;
        border-radius: var(--radius);
        overflow: hidden;
        border: 1px solid var(--border);
      }
      .insight-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .insight-item {
        background: var(--surface2);
        border-left: 3px solid var(--primary);
        border-radius: 0 var(--radius) var(--radius) 0;
        padding: 10px 14px;
        font-size: 13px;
      }
      .btn {
        padding: 8px 16px;
        border-radius: var(--radius);
        border: none;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        transition: all 0.2s;
      }
      .btn-primary {
        background: var(--primary2);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--primary);
      }
      .actions {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">SFE OPS <span>HTML Builder</span></div>
    </div>

    <div class="layers">
      <div class="layer" id="layer-ops">
        <div class="ops-sidebar">
          <div class="sidebar-header">
            <h3>분석 모듈 선택</h3>
          </div>
          <div class="module-list">
            <div
              class="module-card active"
              onclick="selectModule('sandbox', this)"
            >
              <div class="mc-title">📈 Sandbox 분석</div>
              <div class="mc-desc">매출·달성률·CRM 통합 분석 보고서</div>
            </div>
            <div class="module-card" onclick="selectModule('territory', this)">
              <div class="mc-title">🗺️ Territory 지도</div>
              <div class="mc-desc">권역별 마커·동선·히트맵 지도 보고서</div>
            </div>
            <div class="module-card" onclick="selectModule('crm', this)">
              <div class="mc-title">🏥 CRM 활동 분석</div>
              <div class="mc-desc">병원·담당자·CRM 활동 집계 보고서</div>
            </div>
            <div
              class="module-card"
              onclick="selectModule('prescription', this)"
            >
              <div class="mc-title">💊 Prescription 흐름</div>
              <div class="mc-desc">도매→약국→병원 흐름 분석 보고서</div>
            </div>
          </div>
          <div
            class="upload-zone"
            onclick="document.getElementById('ops-file').click()"
          >
            <div>📂</div>
            <p>Result Asset JSON 업로드<br />또는 여기에 파일을 끌어놓기</p>
            <input
              type="file"
              id="ops-file"
              accept=".json"
              onchange="loadOpsAsset(event)"
              style="display: none"
            />
          </div>
        </div>

        <div class="ops-main" id="ops-main">
          <div class="ops-placeholder" id="ops-placeholder">
            <div class="icon">📊</div>
            <p>
              왼쪽에서 모듈을 선택하거나<br />Result Asset JSON을 업로드하세요
            </p>
          </div>
        </div>
      </div>
    </div>
    <script src="./html_builder_templates.js"></script>
    <script src="./html_builder.js"></script>
  </body>
</html>
