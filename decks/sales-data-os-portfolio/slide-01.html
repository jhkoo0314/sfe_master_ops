<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Data OS Portfolio - Slide 01</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --bg: #050714;
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --accent: #D4A574;
            --point: #1B4965;
            --point-light: #62B6CB;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--text-primary); 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            overflow: hidden; 
            width: 100vw; 
            height: 100vh;
        }

        /* Ambient Background */
        .ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
            background: radial-gradient(circle at 20% 30%, rgba(27, 73, 101, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(212, 165, 116, 0.1) 0%, transparent 40%);
        }

        .mesh-glow {
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(98, 182, 203, 0.05) 0%, transparent 70%);
            filter: blur(80px);
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(50%, 50%); }
        }

        .slide { 
            width: 100vw; height: 100vh; 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            position: relative; z-index: 10;
            padding: 80px;
        }

        .hero-title {
            text-align: center;
            max-width: 1200px;
        }

        .badge {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(212, 165, 116, 0.1);
            border: 1px solid rgba(212, 165, 116, 0.3);
            color: var(--accent);
            border-radius: 100px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(3rem, 8vw, 5.5rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            letter-spacing: -0.03em;
            background: linear-gradient(180deg, #FFFFFF 0%, rgba(255,255,255,0.6) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 1.5rem;
            color: var(--text-secondary);
            max-width: 800px;
            margin: 0 auto 4rem;
            line-height: 1.5;
            word-break: keep-all;
        }

        .meta-info {
            display: flex;
            gap: 40px;
            justify-content: center;
            border-top: 1px solid var(--glass-border);
            padding-top: 3rem;
        }

        .meta-item span {
            display: block;
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .meta-item p {
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Main Visual */
        .os-logo-wrap {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 800px; height: 800px;
            z-index: -1;
            opacity: 0.3;
        }

        /* Animations */
        .fade-up { opacity: 0; transform: translateY(30px); animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

        /* Nav Controls */
        .nav-controls { position: fixed; bottom: 40px; right: 40px; display: flex; gap: 15px; z-index: 100; }
        .nav-btn { width: 54px; height: 54px; border-radius: 50%; border: 1px solid var(--glass-border); background: var(--glass); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; backdrop-filter: blur(10px); transition: all 0.3s ease; }
        .nav-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="ambient-bg">
        <div class="mesh-glow"></div>
    </div>

    <div class="slide">
        <div class="os-logo-wrap">
            <svg viewBox="0 0 200 200" width="100%" height="100%">
                <defs>
                    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--accent);stop-opacity:0.2" />
                        <stop offset="100%" style="stop-color:var(--point-light);stop-opacity:0.05" />
                    </linearGradient>
                </defs>
                <circle cx="100" cy="100" r="80" fill="none" stroke="url(#grad1)" stroke-width="0.5" stroke-dasharray="4 4" />
                <circle cx="100" cy="100" r="60" fill="none" stroke="url(#grad1)" stroke-width="0.2" />
                <path d="M100 20 L100 180 M20 100 L180 100" stroke="url(#grad1)" stroke-width="0.1" />
            </svg>
        </div>

        <div class="hero-title">
            <div class="badge fade-up">Sales Planning & SFE Specialist</div>
            <h1 class="fade-up delay-1">SALES DATA OS<br>PORTFOLIO</h1>
            <p class="description fade-up delay-2">
                현장의 복잡성을 관리 가능한 숫자로 전환합니다.<br>
                14년의 영업 인사이트와 데이터 기술이 결합된 통합 운영 체계.
            </p>
            
            <div class="meta-info fade-up delay-3">
                <div class="meta-item">
                    <span>Expertise</span>
                    <p>SFE / CRM / Sales Operations</p>
                </div>
                <div class="meta-item">
                    <span>Core Value</span>
                    <p>Field Insight to Operating Logic</p>
                </div>
            </div>
        </div>
    </div>

    <div class="nav-controls">
        <a href="index.html" class="nav-btn" title="Back to Index">☗</a>
        <button class="nav-btn" title="Disabled" style="opacity: 0.3; cursor: default;">←</button>
        <button class="nav-btn" onclick="location.href='slide-02.html'" title="Next Slide">→</button>
    </div>

    <script>
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') location.href = 'slide-02.html';
        });
    </script>
</body>
</html>
