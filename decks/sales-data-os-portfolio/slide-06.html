<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Data OS Portfolio - Slide 06</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --bg: #050714;
            --accent: #D4A574;
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text-primary); font-family: 'Pretendard', sans-serif; overflow: hidden; width: 100vw; height: 100vh; }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }

        .slide { width: 100vw; height: 100vh; padding: 80px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        
        /* Background Motif */
        .bg-motif {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 800px; height: 800px;
            opacity: 0.05;
            z-index: 0;
            pointer-events: none;
        }

        .container { max-width: 1000px; width: 100%; z-index: 10; text-align: center; }
        
        .label { color: var(--accent); font-weight: 700; font-size: 0.9rem; letter-spacing: 0.15em; margin-bottom: 2rem; display: block; }
        h2 { font-size: 3.2rem; font-weight: 700; line-height: 1.3; margin-bottom: 4rem; }

        .positioning-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 5rem 4rem;
            position: relative;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .role-tag {
            font-family: 'Outfit', sans-serif;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.6rem 2rem;
            border-radius: 100px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 0.85rem;
        }

        .main-statement {
            font-size: 2.2rem;
            line-height: 1.45;
            font-weight: 700;
            margin-bottom: 2.5rem;
            color: #FFFFFF;
            word-break: keep-all;
        }

        .project-highlight {
            font-size: 5rem;
            font-family: 'Outfit', sans-serif;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 1.5rem 0;
            filter: drop-shadow(0 0 20px rgba(212,165,116,0.3));
        }

        .description {
            font-size: 1.2rem;
            line-height: 1.8;
            color: var(--text-secondary);
            margin-top: 2rem;
            word-break: keep-all;
            max-width: 800px;
            margin-inline: auto;
        }

        /* Animations */
        .fade-up { opacity: 0; transform: translateY(30px); animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }

        /* Nav Controls */
        .nav-controls { position: fixed; bottom: 40px; right: 40px; display: flex; gap: 15px; z-index: 100; }
        .nav-btn { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--glass-border); background: var(--glass); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .nav-btn:hover { background: var(--accent); border-color: var(--accent); color: #000; }
    </style>
</head>
<body>

    <svg class="bg-motif" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="45" fill="none" stroke="var(--accent)" stroke-width="0.5" stroke-dasharray="2 2" />
        <circle cx="50" cy="50" r="30" fill="none" stroke="var(--accent)" stroke-width="0.5" />
        <path d="M50 5 L50 95 M5 50 L95 50" stroke="var(--accent)" stroke-width="0.2" />
    </svg>
    
    <div class="slide">
        <div class="container">
            <span class="label fade-up">CURRENT FOCUS</span>
            <h2 class="fade-up delay-1">전문성을 향한 명확한 방향</h2>
            
            <div class="positioning-card fade-up delay-2">
                <span class="role-tag">Sales Planning / SFE Specialist</span>
                <p class="main-statement">
                    현장의 경험을 '관리 가능한 데이터 구조'로 바꾸고,<br>
                    작동 가능한 영업 운영 시스템을 설계합니다.
                </p>
                <div class="project-highlight">Sales Data OS</div>
                <p class="description">
                    단순한 대시보드를 넘어, 활동의 질과 성과의 인과관계를 입증하기 위해<br>
                    제가 직접 설계하고 구축한 영업 운영 체계의 결과물입니다.
                </p>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <div class="nav-controls">
        <button class="nav-btn" onclick="location.href='slide-05.html'" title="Previous Slide">←</button>
        <button class="nav-btn" onclick="location.href='slide-07.html'" title="Next Slide">→</button>
    </div>

    <script>
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') location.href = 'slide-07.html';
            if (e.key === 'ArrowLeft') location.href = 'slide-05.html';
        });
    </script>
</body>
</html>
