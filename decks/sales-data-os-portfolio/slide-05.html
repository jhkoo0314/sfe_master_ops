<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Data OS Portfolio - Slide 05</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --bg: #050714;
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --accent: #D4A574;
            --point: #1B4965;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); color: var(--text-primary); 
            font-family: 'Pretendard', sans-serif; overflow: hidden; 
            width: 100vw; height: 100vh;
        }

        .slide { 
            width: 100vw; height: 100vh; padding: 80px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative;
        }

        .label {
            color: var(--accent); font-family: 'Outfit', sans-serif; font-weight: 700;
            font-size: 0.9rem; letter-spacing: 0.15em; margin-bottom: 2rem;
            text-align: center;
        }

        h2 {
            font-size: 3.2rem; font-weight: 700; line-height: 1.3; margin-bottom: 5rem;
            text-align: center; max-width: 900px;
        }

        .bridge-visual {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            width: 100%;
            gap: 40px;
            position: relative;
        }

        .bridge-visual::before {
            content: '';
            position: absolute;
            top: 40px; left: 15%; right: 15%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            z-index: 0;
            opacity: 0.3;
        }

        .node {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 3rem 2rem;
            border-radius: 20px;
            text-align: center;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .node:hover { transform: translateY(-10px); border-color: var(--accent); background: rgba(212, 165, 116, 0.05); }

        .node-num {
            width: 40px; height: 40px;
            background: var(--accent);
            color: #000;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Outfit', sans-serif; font-weight: 700;
            margin: -50px auto 30px;
            box-shadow: 0 0 20px rgba(212, 165, 116, 0.3);
        }

        .node h3 { font-size: 1.4rem; margin-bottom: 1.5rem; color: #FFFFFF; font-weight: 700; }
        .node p { font-size: 1.05rem; line-height: 1.65; color: var(--text-secondary); word-break: keep-all; }

        .conclusion {
            margin-top: 6rem;
            font-size: 1.6rem;
            font-weight: 700;
            color: #FFFFFF;
        }
        .conclusion strong { color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* Animations */
        .fade-up { opacity: 0; transform: translateY(30px); animation: fadeUp 0.8s ease-out forwards; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

        /* Nav Controls */
        .nav-controls { position: fixed; bottom: 40px; right: 40px; display: flex; gap: 15px; }
        .nav-btn { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--glass-border); background: var(--glass); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .nav-btn:hover { background: var(--accent); border-color: var(--accent); color: #000; }
    </style>
</head>
<body>

    <div class="slide">
        <span class="label fade-up">STRATEGIC TRANSITION</span>
        <h2 class="fade-up delay-1">영업 기획과 SFE를 향한 필연적인 여정</h2>
        
        <div class="bridge-visual fade-up delay-2">
            <div class="node">
                <div class="node-num">01</div>
                <h3>현장에서 시작된 의문</h3>
                <p>영업 활동과 실적 사이의<br>'Black Box'를 어떻게 하면<br>관리 가능한 체계로 만들 수 있는가</p>
            </div>
            
            <div class="node">
                <div class="node-num">02</div>
                <h3>데이터의 언어를 체득</h3>
                <p>AI/데이터 학습을 통해<br>현장의 파편화된 정보를<br>하나의 운영 로직으로 통합하는 힘</p>
            </div>

            <div class="node">
                <div class="node-num">03</div>
                <h3>운영 체계의 설계</h3>
                <p>성과, 행동, 목표, 관리라는<br>각 점들을 연결하여<br>작동하는 'Sales OS'를 구축</p>
            </div>
        </div>

        <div class="conclusion fade-up delay-3">
            현장과 소통하고 데이터를 통해 <strong>관리 가능한 지표</strong>로 만들겠습니다.
        </div>
    </div>

    <!-- Navigation -->
    <div class="nav-controls">
        <button class="nav-btn" onclick="location.href='slide-04.html'" title="Previous Slide">←</button>
        <button class="nav-btn" onclick="location.href='slide-06.html'" title="Next Slide">→</button>
    </div>

    <script>
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') location.href = 'slide-06.html';
            if (e.key === 'ArrowLeft') location.href = 'slide-04.html';
        });
    </script>
</body>
</html>
