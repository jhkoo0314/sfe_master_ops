<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Data OS Portfolio - Slide 03</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --bg: #050714;
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --accent: #E11D48; /* Crimson / Alert */
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); color: var(--text-primary); 
            font-family: 'Pretendard', sans-serif; overflow: hidden; 
            width: 100vw; height: 100vh;
        }

        .slide { 
            width: 100vw; height: 100vh; padding: 80px; 
            display: flex; flex-direction: column; justify-content: center;
            position: relative;
        }

        .label {
            color: var(--accent); font-family: 'Outfit', sans-serif; font-weight: 700;
            font-size: 0.9rem; letter-spacing: 0.15em; margin-bottom: 2rem;
        }

        h2 {
            font-size: 3.2rem; font-weight: 700; line-height: 1.3; margin-bottom: 4rem;
            word-break: keep-all; max-width: 900px;
        }

        .insight-visual {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 100px;
        }

        .pyramid {
            display: grid;
            gap: 15px;
            width: 450px;
        }

        .layer {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 12px;
            position: relative;
            transition: all 0.3s ease;
        }
        .layer:hover { background: rgba(225, 29, 72, 0.05); border-color: var(--accent); transform: scale(1.02); }

        .layer h3 { font-family: 'Outfit', sans-serif; font-size: 1.2rem; color: var(--accent); margin-bottom: 0.5rem; }
        .layer p { font-size: 1rem; color: var(--text-secondary); line-height: 1.5; }

        .point-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.02);
            border-left: 2px solid var(--accent);
            padding: 3rem;
            border-radius: 0 16px 16px 0;
        }

        .point-box h4 { font-size: 1.8rem; margin-bottom: 2rem; }
        .point-box ul { list-style: none; }
        .point-box li { 
            font-size: 1.25rem; color: var(--text-secondary); 
            margin-bottom: 1.5rem; display: flex; align-items: flex-start; gap: 12px;
        }
        .point-box li::before { content: '✕'; color: var(--accent); font-weight: 900; }

        /* Animations */
        .fade-up { opacity: 0; transform: translateY(30px); animation: fadeUp 0.8s ease-out forwards; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }

        /* Nav Controls */
        .nav-controls { position: fixed; bottom: 40px; right: 40px; display: flex; gap: 15px; }
        .nav-btn { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--glass-border); background: var(--glass); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .nav-btn:hover { background: var(--accent); border-color: var(--accent); }
    </style>
</head>
<body>

    <div class="slide">
        <span class="label fade-up">THE PROBLEM OBSERVED</span>
        <h2 class="fade-up delay-1">현장에서 목격한 가장 큰 관리의 공백</h2>
        
        <div class="insight-visual fade-up delay-2">
            <div class="pyramid">
                <div class="layer">
                    <h3>ACTION</h3>
                    <p>코칭/대응: 무엇을 해야 하는가?</p>
                </div>
                <div class="layer">
                    <h3>INTERPRETATION</h3>
                    <p>현상 진단: 왜 이런 숫자가 나오는가?</p>
                </div>
                <div class="layer">
                    <h3>OBSERVATION</h3>
                    <p>데이터: 무엇이 발생했는가?</p>
                </div>
            </div>

            <div class="point-box">
                <h4>분절된 데이터가 낳는 한계</h4>
                <ul>
                    <li>실적 숫자는 있는데, 그 숫자를 만든 행동의 '질'은 보이지 않음</li>
                    <li>팀장은 감각에 의존해 코칭하고, 담당자는 보고를 위한 데이터만 생산</li>
                    <li>결과 중심의 관리는 결국 '사후 처리'에 머무를 수밖에 없음</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <div class="nav-controls">
        <button class="nav-btn" onclick="location.href='slide-02.html'" title="Previous Slide">←</button>
        <button class="nav-btn" onclick="location.href='slide-04.html'" title="Next Slide">→</button>
    </div>

    <script>
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') location.href = 'slide-04.html';
            if (e.key === 'ArrowLeft') location.href = 'slide-02.html';
        });
    </script>
</body>
</html>
