<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Data OS Portfolio - Slide 02</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --bg: #050714;
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --accent: #D4A574;
            --point: #1B4965;
            --point-light: #62B6CB;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text-primary); font-family: 'Pretendard', sans-serif; overflow: hidden; width: 100vw; height: 100vh; }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }

        .slide { 
            width: 100vw; height: 100vh; padding: 80px;
            display: grid; grid-template-columns: 1.2fr 1fr;
            align-items: center; gap: 60px; position: relative;
        }

        .content-left { max-width: 600px; }
        .label {
            display: inline-block; color: var(--accent); font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.9rem;
            letter-spacing: 0.15em; margin-bottom: 2rem; padding-left: 20px; position: relative;
        }
        .label::before { content: ''; position: absolute; left: 0; top: 50%; width: 12px; height: 2px; background: var(--accent); transform: translateY(-50%); }

        h2 { font-size: 3.5rem; font-weight: 700; line-height: 1.2; margin-bottom: 2.5rem; word-break: keep-all; }
        .statement {
            font-size: 1.4rem; color: var(--text-secondary); line-height: 1.7; margin-bottom: 3.5rem; padding-left: 2rem; border-left: 1px solid var(--accent);
        }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .stat-item h3 { font-family: 'Outfit', sans-serif; font-size: 2.5rem; color: var(--accent); margin-bottom: 0.5rem; }
        .stat-item p { font-size: 1.1rem; color: var(--text-secondary); }

        /* Redesigned Visual Side */
        .visual-right {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            height: 550px;
            border-radius: 40px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .bridge-container {
            width: 100%; height: 100%;
            position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* SVG Construction */
        .connector-svg {
            position: absolute;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* Zone Nodes */
        .node-wrap {
            position: relative;
            z-index: 10;
            display: flex; flex-direction: column; align-items: center; gap: 80px;
        }

        .zone {
            width: 240px;
            padding: 2.5rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .zone:hover { border-color: var(--accent); transform: translateY(-5px); }
        .zone svg { width: 40px; height: 40px; margin-bottom: 1rem; stroke: var(--accent); fill: none; stroke-width: 1.5; }
        .zone strong { display: block; font-size: 1.15rem; margin-bottom: 0.5rem; }
        .zone span { font-size: 0.85rem; color: var(--text-secondary); }

        .center-connector {
            width: 60px; height: 60px;
            background: var(--accent);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 15;
            box-shadow: 0 0 40px rgba(212, 165, 116, 0.4);
            border: 4px solid var(--bg);
        }
        .center-connector svg { width: 24px; height: 24px; stroke: #000; stroke-width: 2.5; fill: none; }

        /* Animations */
        .fade-up { opacity: 0; transform: translateY(30px); animation: fadeUp 0.8s ease-out forwards; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

        /* Nav Controls */
        .nav-controls { position: fixed; bottom: 40px; right: 40px; display: flex; gap: 15px; z-index: 100; }
        .nav-btn { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--glass-border); background: var(--glass); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .nav-btn:hover { background: var(--accent); border-color: var(--accent); color: #000; }
    </style>
</head>
<body>

    <div class="slide">
        <div class="content-left">
            <span class="label fade-up">PROFESSIONAL IDENTITY</span>
            <h2 class="fade-up delay-1">현장을 아는<br>비즈니스 기획</h2>
            <p class="statement fade-up delay-2">
                단순 영업을 넘어, 현장의 비효율을 바로잡고 조직의 성과와 운영관리를 
                쳬계화하는 역할을 수행합니다.
            </p>

            <div class="stat-grid fade-up delay-3">
                <div class="stat-item">
                    <h3>14Y+</h3>
                    <p>Pharma Sales Base<br>(Clinics to Hospital)</p>
                </div>
                <div class="stat-item">
                    <h3>Build</h3>
                    <p>Field Insight to<br>Operating Logic</p>
                </div>
            </div>
        </div>

        <div class="visual-right fade-up delay-2">
            <div class="bridge-container">
                <!-- SVG Connections -->
                <svg class="connector-svg">
                    <line x1="50%" y1="20%" x2="50%" y2="80%" stroke="var(--glass-border)" stroke-width="1" stroke-dasharray="8 8" />
                    <circle cx="50%" cy="50%" r="120" fill="none" stroke="rgba(212,165,116,0.1)" stroke-width="1" />
                </svg>

                <div class="node-wrap">
                    <div class="zone top-zone">
                        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        <strong>FIELD EVIDENCE</strong>
                        <span>14년 현장 실천 지성</span>
                    </div>

                    <div class="zone bottom-zone">
                        <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                        <strong>SYSTEM LOGIC</strong>
                        <span>데이터 기반 운영 설계</span>
                    </div>
                </div>

                <div class="center-connector">
                    <svg viewBox="0 0 24 24"><path d="M7 11l5 5 5-5M7 5l5 5 5-5"/></svg>
                </div>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <div class="nav-controls">
        <a href="index.html" class="nav-btn" title="Back to Index">☗</a>
        <button class="nav-btn" onclick="location.href='slide-01.html'" title="Previous Slide">←</button>
        <button class="nav-btn" onclick="location.href='slide-03.html'" title="Next Slide">→</button>
    </div>

    <script>
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') location.href = 'slide-03.html';
            if (e.key === 'ArrowLeft') location.href = 'slide-01.html';
        });
    </script>
</body>
</html>
