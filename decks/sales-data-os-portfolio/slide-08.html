<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Data OS Portfolio - Slide 08</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --bg: #050714;
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --accent: #E11D48; /* Warning / Problem */
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); color: var(--text-primary); 
            font-family: 'Pretendard', sans-serif; overflow: hidden; 
            width: 100vw; height: 100vh;
        }

        .slide { 
            width: 100vw; height: 100vh; padding: 80px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative;
        }

        .label { color: var(--accent); font-weight: 700; font-size: 0.9rem; letter-spacing: 0.15em; margin-bottom: 2rem; }
        h2 { font-size: 3.2rem; font-weight: 700; line-height: 1.3; margin-bottom: 5rem; text-align: center; max-width: 900px; }

        .gap-visual {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 300px;
            position: relative;
        }

        .node {
            width: 250px;
            height: 180px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
            padding: 20px;
            position: relative;
        }

        .n1 { border-color: #4B5563; }
        .n2 { border: 2px dashed var(--accent); color: var(--accent); background: rgba(225, 29, 72, 0.05); }
        .n2 h3 { color: var(--accent) !important; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .n3 { border-color: #4B5563; }

        .node h3 { font-family: 'Outfit', sans-serif; font-size: 1.6rem; margin-bottom: 10px; color: #FFFFFF; }
        .node p { font-size: 0.95rem; color: var(--text-secondary); line-height: 1.5; }

        .link-line {
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, #4B5563, transparent 50%, #4B5563);
            margin: 0 20px;
            position: relative;
        }

        .link-line::after { content: '✕'; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); color: var(--accent); font-weight: 900; font-size: 1.4rem; }

        .conclusion {
            margin-top: 6rem;
            font-size: 1.4rem;
            text-align: center;
            color: var(--text-secondary);
            line-height: 1.6;
            max-width: 800px;
            word-break: keep-all;
        }

        /* Animations */
        .fade-up { opacity: 0; transform: translateY(30px); animation: fadeUp 0.8s ease-out forwards; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }

        /* Nav Controls */
        .nav-controls { position: fixed; bottom: 40px; right: 40px; display: flex; gap: 15px; }
        .nav-btn { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--glass-border); background: var(--glass); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .nav-btn:hover { background: var(--accent); border-color: var(--accent); }
    </style>
</head>
<body>

    <div class="slide">
        <span class="label fade-up">THE LOGIC GAP</span>
        <h2 class="fade-up delay-1">데이터만 있고 '운영 논리'는 없는 현실</h2>
        
        <div class="gap-visual fade-up delay-2">
            <div class="node n1">
                <h3>Raw Data</h3>
                <p>활동보고, 실적, 목표<br>방대한 정보의 수집</p>
            </div>
            
            <div class="link-line"></div>

            <div class="node n2">
                <h3>?</h3>
                <p><strong>통합 관리 기준<br>(Operating Logic)</strong></p>
            </div>

            <div class="link-line"></div>

            <div class="node n3">
                <h3>Dashboards</h3>
                <p>BI 리포트, 대시보드<br>화려하지만 해석 불능</p>
            </div>
        </div>

        <p class="conclusion fade-up delay-2">
            시스템이 제안하는 <strong>'무엇을 먼저 봐야 하는가'</strong>에 대한 기준이 없으면,<br>
            대시보드는 단지 숫자를 복잡하게 보여주는 그림에 불과합니다.
        </p>
    </div>

    <!-- Navigation -->
    <div class="nav-controls">
        <button class="nav-btn" onclick="location.href='slide-07.html'" title="Previous Slide">←</button>
        <button class="nav-btn" onclick="location.href='slide-09.html'" title="Next Slide">→</button>
    </div>

    <script>
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') location.href = 'slide-09.html';
            if (e.key === 'ArrowLeft') location.href = 'slide-07.html';
        });
    </script>
</body>
</html>
